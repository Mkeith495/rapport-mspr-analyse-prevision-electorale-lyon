version: '3.8'

services:
  db:
    image: postgres:15
    container_name: msp_solo_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: electio_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:latest
    container_name: msp_solo_metabase
    restart: always
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: electio_db
      MB_DB_PORT: 5432
      MB_DB_USER: admin
      MB_DB_PASS: password123
      MB_DB_HOST: db
    depends_on:
      - db

  adminer:
    image: adminer
    container_name: msp_solo_adminer
    restart: always
    ports:
      - "8081:8080"